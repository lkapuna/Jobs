services:
  - type: web
    name: jobs-crm
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: alef.shin.jobs@gmail.com
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        value: alef.shin.jobs@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: א.ש השמת עובדים <alef.shin.jobs@gmail.com>
      - key: MAIL_REPLY_TO
        value: alef.shin.jobs@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
