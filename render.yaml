services:
  - type: web
    name: jobs-crm
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: alef.shin.jobs@gmail.com
      - key: EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: onboarding@resend.dev
      - key: MAIL_REPLY_TO
        value: alef.shin.jobs@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
