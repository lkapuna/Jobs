<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>א.ש השמת עובדים - כניסת אדמין</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #eef2f6;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #667085;
      --line: #d9e0e8;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --danger: #b42318;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Heebo, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .bar {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .brand {
      color: var(--ink);
      text-decoration: none;
      font-size: 1.35rem;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .brand span { color: var(--accent); }
    .brand-logo {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      object-fit: contain;
      background: #fff;
      border: 1px solid var(--line);
    }
    .brand-name { white-space: nowrap; }
    .version-chip {
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      font-weight: 800;
      direction: ltr;
    }
    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 34px 16px;
    }
    .login-box {
      width: min(440px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.7rem;
      line-height: 1.2;
    }
    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.55;
    }
    .form-group { margin-bottom: 15px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: #344054;
      font-size: 0.86rem;
      font-weight: 800;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--ink);
      background: #fff;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }
    button {
      width: 100%;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      margin-top: 6px;
    }
    button:hover { background: var(--accent-strong); }
    button:disabled { opacity: 0.65; cursor: wait; }
    .error-msg {
      display: none;
      margin-bottom: 14px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.92rem;
      font-weight: 700;
    }
    .back-link {
      margin-top: 18px;
      text-align: center;
    }
    .back-link a {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
    }
    .site-footer {
      border-top: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      padding: 14px 16px;
      text-align: center;
      font-size: 0.86rem;
      font-weight: 700;
      direction: ltr;
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <a href="/" class="brand">
        <img class="brand-logo" src="/assets/ash-hasama-logo.png" alt="לוגו א.ש השמת עובדים">
        <span class="brand-name">א.ש השמת עובדים</span>
      </a>
      <span class="version-chip">v1.2.9</span>
    </div>
  </header>

  <main>
    <section class="login-box">
      <h1>כניסת אדמין</h1>
      <p class="subtitle">ניהול משרות, מועמדים, הערות ושליחה למעסיקים.</p>
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm">
        <div class="form-group">
          <label>אימייל</label>
          <input type="email" id="email" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label>סיסמה</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="submit-btn">כניסה למערכת</button>
      </form>
      <div class="back-link">
        <a href="/">חזרה למשרות הפתוחות</a>
      </div>
    </section>
  </main>
  <footer class="site-footer">v1.2.9 · L.K Consulting</footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async event => {
      event.preventDefault();
      const button = event.currentTarget.querySelector('.submit-btn');
      const error = document.getElementById('errorMsg');
      error.style.display = 'none';
      button.textContent = 'מתחבר...';
      button.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        if (data.user.role !== 'admin') {
          localStorage.clear();
          throw new Error('הכניסה למסך הזה מיועדת לאדמין בלבד.');
        }

        window.location = '/pages/admin-dashboard.html';
      } catch (err) {
        error.textContent = err.message || 'לא ניתן להתחבר כרגע.';
        error.style.display = 'block';
        button.textContent = 'כניסה למערכת';
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
