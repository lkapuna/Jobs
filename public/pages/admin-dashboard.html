<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>א.ש השמת עובדים - אדמין</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #eef2f6;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #667085;
      --line: #d9e0e8;
      --soft: #f8fafc;
      --accent: #0f766e;
      --blue: #2563eb;
      --danger: #b42318;
      --warn: #b45309;
    }
    body {
      margin: 0;
      font-family: Heebo, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    .shell { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
    aside {
      background: #101828;
      color: #fff;
      padding: 22px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .brand {
      font-size: 1.05rem;
      font-weight: 900;
      padding: 0 10px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1.25;
    }
    .brand span { color: #fff; }
    .brand-logo {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      object-fit: contain;
      background: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      flex: 0 0 auto;
    }
    .version-chip {
      display: inline-flex;
      margin: 0 10px 18px;
      border: 1px solid rgba(255,255,255,0.18);
      color: #cbd5e1;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.78rem;
      font-weight: 800;
      direction: ltr;
    }
    nav { display: grid; gap: 6px; }
    .nav {
      border: 0;
      background: transparent;
      color: #cbd5e1;
      width: 100%;
      text-align: right;
      padding: 11px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .nav.active, .nav:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .logout { margin-top: 22px; border: 1px solid rgba(255,255,255,0.2); }
    main { padding: 24px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 { margin: 0; font-size: 1.5rem; }
    .sub { color: var(--muted); font-size: 0.92rem; margin-top: 3px; }
    button, input, select, textarea {
      font-family: inherit;
      font-size: 0.94rem;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 13px;
      font-weight: 700;
      cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.blue { background: var(--blue); border-color: var(--blue); color: #fff; }
    button.danger { background: #fff; border-color: #fecaca; color: var(--danger); }
    button:disabled { opacity: 0.55; cursor: wait; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
      color: var(--ink);
    }
    textarea { resize: vertical; min-height: 90px; }
    label { display: block; font-size: 0.82rem; color: #344054; font-weight: 700; margin-bottom: 5px; }
    .section { display: none; }
    .section.active { display: block; }
    .cards { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .card { padding: 18px; }
    .metric { font-size: 2rem; font-weight: 900; color: var(--accent); }
    .metric-label { color: var(--muted); font-weight: 700; }
    .panel { overflow: hidden; margin-bottom: 16px; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .panel-title { font-weight: 900; }
    .filters {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr auto;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: right; vertical-align: top; }
    th { color: var(--muted); background: var(--soft); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0; }
    tr:hover td { background: #fbfdff; }
    .muted { color: var(--muted); }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.78rem;
      font-weight: 800;
      background: #e5e7eb;
      color: #344054;
      white-space: nowrap;
    }
    .status-new { background: #dbeafe; color: #1d4ed8; }
    .status-in_progress, .status-contacted, .status-waiting_employer { background: #fef3c7; color: #92400e; }
    .status-sent_to_employer, .status-sent_to_interview, .status-ready_to_send { background: #e0e7ff; color: #3730a3; }
    .status-started_working, .status-accepted { background: #dcfce7; color: #166534; }
    .status-not_relevant { background: #fee2e2; color: #991b1b; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { background: #f1f5f9; border: 1px solid #dbe3ec; border-radius: 999px; padding: 3px 8px; color: #475467; font-size: 0.78rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .field { margin-bottom: 12px; }
    .full { grid-column: 1 / -1; }
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.55);
      z-index: 50;
    }
    .modal.open { display: flex; }
    .dialog {
      width: min(980px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--line);
    }
    .dialog-head, .dialog-foot {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }
    .dialog-foot { border-top: 1px solid var(--line); border-bottom: 0; justify-content: flex-end; }
    .dialog-body { padding: 16px; }
    .tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--line); margin-bottom: 14px; }
    .tab { border-radius: 8px 8px 0 0; border-bottom: 0; }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .note {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: #fff;
    }
    .note small { color: var(--muted); font-weight: 700; }
    .toast {
      position: fixed;
      left: 18px;
      bottom: 18px;
      background: #101828;
      color: #fff;
      border-radius: 8px;
      padding: 12px 16px;
      max-width: 420px;
      opacity: 0;
      transform: translateY(10px);
      transition: 0.2s;
      pointer-events: none;
      z-index: 80;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .site-footer {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      padding: 14px 4px 0;
      text-align: center;
      font-size: 0.86rem;
      font-weight: 700;
      direction: ltr;
    }
    .print-card { display: none; }
    @media print {
      body * { visibility: hidden; }
      .print-card, .print-card * { visibility: visible; }
      .print-card {
        display: block;
        position: absolute;
        inset: 0;
        background: #fff;
        color: #111;
        padding: 28px;
        font-family: Heebo, Arial, sans-serif;
      }
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      aside { position: relative; height: auto; }
      .cards, .filters, .grid, .grid-3 { grid-template-columns: 1fr; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="brand">
        <img class="brand-logo" src="/assets/ash-hasama-logo.png" alt="לוגו א.ש השמת עובדים">
        <span>א.ש השמת עובדים</span>
      </div>
      <div class="version-chip">v1.2.1</div>
      <nav>
        <button class="nav active" onclick="showSection('overview')">סקירה</button>
        <button class="nav" onclick="showSection('candidates')">מועמדים</button>
        <button class="nav" onclick="showSection('jobs')">משרות</button>
        <button class="nav" onclick="showSection('employers')">מעסיקים</button>
        <button class="nav" onclick="showSection('agreements')">הסכמי השמה</button>
        <button class="nav" onclick="showSection('submissions')">שליחות למעסיקים</button>
        <button class="nav logout" onclick="logout()">יציאה</button>
      </nav>
    </aside>

    <main>
      <div class="top">
        <div>
          <h1 id="pageTitle">סקירת מערכת</h1>
          <div class="sub" id="pageSub">ניהול משרות, מועמדים, הערות ושליחה למעסיקים</div>
        </div>
        <div class="row-actions">
          <button onclick="sendTestEmail()">בדיקת מייל</button>
          <button onclick="refresh()">רענן</button>
        </div>
      </div>

      <section id="section-overview" class="section active">
        <div class="cards" id="statsCards"></div>
        <div class="panel">
          <div class="panel-head"><span class="panel-title">מועמדים אחרונים</span><button onclick="showSection('candidates')">לכל המועמדים</button></div>
          <div id="recentCandidates"></div>
        </div>
      </section>

      <section id="section-candidates" class="section">
        <div class="panel">
          <div class="panel-head"><span class="panel-title">מאגר מועמדים</span><span id="candidateCount" class="muted"></span></div>
          <div class="filters">
            <input id="candidateQ" placeholder="שם, טלפון או אימייל" oninput="filterCandidates()">
            <select id="candidateStatus" onchange="filterCandidates()"></select>
            <input id="candidateCategory" placeholder="קטגוריה: בריסטה, ברמן..." oninput="filterCandidates()">
            <input id="candidateArea" placeholder="אזור" oninput="filterCandidates()">
            <button onclick="resetCandidateFilters()">נקה</button>
          </div>
          <div id="candidateTable"></div>
        </div>
      </section>

      <section id="section-jobs" class="section">
        <div class="panel">
          <div class="panel-head"><span class="panel-title">משרות</span><button class="primary" onclick="openJobModal()">משרה חדשה</button></div>
          <div id="jobsTable"></div>
        </div>
      </section>

      <section id="section-employers" class="section">
        <div class="panel">
          <div class="panel-head"><span class="panel-title">מעסיקים פוטנציאליים</span><button class="primary" onclick="openEmployerModal()">מעסיק חדש</button></div>
          <div id="employersTable"></div>
        </div>
      </section>

      <section id="section-agreements" class="section">
        <div class="cards" id="agreementStats"></div>
        <div class="panel">
          <div class="panel-head"><span class="panel-title">הסכמי השמה</span><button class="primary" onclick="openAgreementModal()">יצירת הסכם השמה</button></div>
          <div class="filters">
            <input id="agreementQ" placeholder="עסק, מועמד, טלפון או תפקיד" oninput="loadAgreements()">
            <select id="agreementStatus" onchange="loadAgreements()">
              <option value="">כל הסטטוסים</option>
              <option value="draft">טיוטה</option>
              <option value="sent">נשלח</option>
              <option value="viewed">נצפה</option>
              <option value="signed">נחתם</option>
              <option value="waiting_payment">ממתין לתשלום</option>
              <option value="paid">שולם</option>
              <option value="cancelled">בוטל</option>
            </select>
            <button onclick="loadAgreements()">רענן</button>
          </div>
          <div id="agreementsTable"></div>
        </div>
      </section>

      <section id="section-submissions" class="section">
        <div class="panel">
          <div class="panel-head"><span class="panel-title">היסטוריית שליחות למעסיקים</span></div>
          <div id="submissionsTable"></div>
        </div>
      </section>
      <footer class="site-footer">v1.2.1 · L.K Consulting</footer>
    </main>
  </div>

  <div class="modal" id="candidateModal"></div>
  <div class="modal" id="jobModal"></div>
  <div class="modal" id="jobCandidatesModal"></div>
  <div class="modal" id="employerModal"></div>
  <div class="modal" id="agreementModal"></div>
  <div class="print-card" id="printCard"></div>
  <div class="toast" id="toast"></div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token || user.role !== 'admin') window.location = '/pages/login.html';

    const headers = () => ({ 'Content-Type': 'application/json', Authorization: `Bearer ${token}` });
    const statusLabels = {
      new: 'חדש',
      in_progress: 'בטיפול',
      contacted: 'יצרנו קשר',
      phone_call_done: 'לאחר שיחה טלפונית',
      front_interview_done: 'עבר ראיון פרונטלי',
      ready_to_send: 'מתאים לשליחה',
      sent_to_employer: 'נשלח למעסיק',
      waiting_employer: 'ממתין לתשובת מעסיק',
      sent_to_interview: 'נשלח לראיון',
      accepted: 'התקבל',
      started_working: 'התחיל לעבוד',
      talent_pool: 'עובד במאגר',
      not_relevant: 'לא מתאים'
    };
    const noteLabels = {
      general: 'כללי',
      phone_call: 'שיחה טלפונית',
      front_interview: 'ראיון פרונטלי',
      internal: 'פנימי בלבד',
      shareable: 'ניתן לשליחה למעסיק'
    };
    const agreementStatusLabels = {
      draft: 'טיוטה',
      sent: 'נשלח',
      viewed: 'נצפה',
      signed: 'נחתם',
      started_working: 'העובד התחיל לעבוד',
      waiting_payment: 'ממתין לתשלום',
      paid: 'שולם',
      cancelled: 'בוטל'
    };
    const state = { section: 'overview', stats: null, candidates: [], jobs: [], employers: [], submissions: [], agreements: [], currentCandidate: null };

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
    }
    function fmtDate(value) {
      if (!value) return '-';
      return new Date(value).toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }
    function badge(status) {
      return `<span class="badge status-${status}">${statusLabels[status] || status || '-'}</span>`;
    }
    function categoryChips(items) {
      return `<div class="chips">${(items || []).map(c => `<span class="chip">${escapeHtml(c)}</span>`).join('') || '<span class="muted">-</span>'}</div>`;
    }
    function statusOptions(selected = '') {
      return '<option value="">כל הסטטוסים</option>' + Object.entries(statusLabels).map(([value, label]) => `<option value="${value}" ${value === selected ? 'selected' : ''}>${label}</option>`).join('');
    }

    function showSection(section) {
      state.section = section;
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      document.getElementById(`section-${section}`).classList.add('active');
      document.querySelectorAll('.nav').forEach(el => el.classList.remove('active'));
      document.querySelector(`[onclick="showSection('${section}')"]`)?.classList.add('active');
      const meta = {
        overview: ['סקירת מערכת', 'תמונת מצב מהירה של הגיוס'],
        candidates: ['מועמדים', 'סינון, סטטוס, הערות וראיונות'],
        jobs: ['משרות', 'יצירה ועריכה של משרות פתוחות'],
        employers: ['מעסיקים', 'אנשי קשר ומעסיקים פוטנציאליים'],
        submissions: ['שליחות למעסיקים', 'מעקב אחרי מועמדים שנשלחו'],
        agreements: ['הסכמי השמה', 'חתימה דיגיטלית, סטטוס עבודה וגבייה']
      };
      document.getElementById('pageTitle').textContent = meta[section][0];
      document.getElementById('pageSub').textContent = meta[section][1];
      refresh();
    }

    async function api(path, options = {}) {
      const res = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    async function refresh() {
      if (state.section === 'overview') return loadOverview();
      if (state.section === 'candidates') return loadCandidates();
      if (state.section === 'jobs') return loadJobs();
      if (state.section === 'employers') return loadEmployers();
      if (state.section === 'agreements') return loadAgreements();
      if (state.section === 'submissions') return loadSubmissions();
    }

    async function sendTestEmail() {
      const result = await api('/api/recruitment/admin/test-email', { method: 'POST', body: JSON.stringify({}) });
      showToast(result.skipped ? 'SMTP לא מוגדר ב-Render ולכן לא נשלח מייל.' : 'מייל בדיקה נשלח למייל הראשי.');
    }

    async function loadOverview() {
      const [stats, candidates] = await Promise.all([
        api('/api/admin/stats'),
        api('/api/recruitment/admin/candidates')
      ]);
      state.stats = stats;
      state.candidates = candidates;
      document.getElementById('statsCards').innerHTML = `
        <div class="card"><div class="metric">${stats.openJobs || 0}</div><div class="metric-label">משרות פתוחות</div></div>
        <div class="card"><div class="metric">${stats.candidates || 0}</div><div class="metric-label">מועמדים במאגר</div></div>
        <div class="card"><div class="metric">${stats.newCandidates || 0}</div><div class="metric-label">פניות חדשות</div></div>
        <div class="card"><div class="metric">${stats.talentPool || 0}</div><div class="metric-label">ממתינים למשרה</div></div>
      `;
      document.getElementById('recentCandidates').innerHTML = renderCandidateTable(candidates.slice(0, 8), false);
    }

    async function loadCandidates() {
      document.getElementById('candidateStatus').innerHTML = statusOptions(document.getElementById('candidateStatus').value);
      const params = new URLSearchParams();
      const q = document.getElementById('candidateQ').value;
      const status = document.getElementById('candidateStatus').value;
      const category = document.getElementById('candidateCategory').value;
      const area = document.getElementById('candidateArea').value;
      if (q) params.set('q', q);
      if (status) params.set('status', status);
      if (category) params.set('category', category);
      if (area) params.set('area', area);
      state.candidates = await api(`/api/recruitment/admin/candidates?${params}`);
      document.getElementById('candidateCount').textContent = `${state.candidates.length} מועמדים`;
      document.getElementById('candidateTable').innerHTML = renderCandidateTable(state.candidates, true);
    }
    function filterCandidates() { loadCandidates().catch(err => showToast(err.message)); }
    function resetCandidateFilters() {
      ['candidateQ', 'candidateStatus', 'candidateCategory', 'candidateArea'].forEach(id => document.getElementById(id).value = '');
      loadCandidates();
    }
    function renderCandidateTable(candidates, actions) {
      if (!candidates.length) return '<div style="padding:24px" class="muted">אין מועמדים להצגה.</div>';
      return `
        <table>
          <thead><tr><th>מועמד</th><th>קטגוריות</th><th>סטטוס</th><th>פנייה אחרונה</th><th>פעולות</th></tr></thead>
          <tbody>
            ${candidates.map(c => `
              <tr>
                <td><strong>${escapeHtml(c.fullName)}</strong><div class="muted">${escapeHtml(c.phone)} ${c.email ? ' | ' + escapeHtml(c.email) : ''}</div><div class="muted">${escapeHtml(c.area || c.city || '')}</div></td>
                <td>${categoryChips(c.categories)}</td>
                <td>${badge(c.status)}</td>
                <td>${escapeHtml(c.applications?.[c.applications.length - 1]?.jobTitle || '-')}<div class="muted">${fmtDate(c.updatedAt || c.createdAt)}</div></td>
                <td><div class="row-actions"><button onclick="openCandidate('${c._id}')">פתח כרטיס</button>${actions ? `<button class="blue" onclick="quickStatus('${c._id}', 'talent_pool')">למאגר</button><button class="danger" onclick="deleteCandidate('${c._id}', '${escapeHtml(c.fullName)}')">מחק</button>` : ''}</div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    async function openCandidate(id) {
      const candidate = await api(`/api/recruitment/admin/candidates/${id}`);
      state.currentCandidate = candidate;
      const modal = document.getElementById('candidateModal');
      modal.innerHTML = `
        <div class="dialog">
          <div class="dialog-head">
            <div><strong>${escapeHtml(candidate.fullName)}</strong><div class="muted">${escapeHtml(candidate.phone)} ${candidate.email ? ' | ' + escapeHtml(candidate.email) : ''}</div></div>
            <button onclick="closeModal('candidateModal')">סגור</button>
          </div>
          <div class="dialog-body">
            <div class="tabs">
              <button class="tab active" onclick="showTab('details')">פרטים</button>
              <button class="tab" onclick="showTab('notes')">הערות וראיונות</button>
              <button class="tab" onclick="showTab('send')">שליחה למעסיק</button>
              <button class="tab" onclick="showTab('files')">הדפסה וקבצים</button>
            </div>

            <div id="tab-details" class="tab-panel active">
              <div class="grid">
                ${inputField('fullName', 'שם מלא', candidate.fullName)}
                ${inputField('identityNumber', 'תעודת זהות', candidate.identityNumber)}
                ${inputField('phone', 'טלפון', candidate.phone)}
                ${inputField('email', 'אימייל', candidate.email)}
                ${inputField('area', 'אזור', candidate.area)}
                ${inputField('city', 'עיר', candidate.city)}
                ${inputField('availability', 'זמינות', candidate.availability)}
                ${inputField('salaryExpectations', 'ציפיות שכר', candidate.salaryExpectations)}
                ${inputField('contactPerson', 'איש קשר / מעסיק', candidate.contactPerson)}

                <div class="field"><label>עדיפות</label><select id="candidateEdit-priority"><option value="normal">רגילה</option><option value="high" ${candidate.priority === 'high' ? 'selected' : ''}>גבוהה</option><option value="low" ${candidate.priority === 'low' ? 'selected' : ''}>נמוכה</option></select></div>

                <div class="field full"><label>ניסיון</label><textarea id="candidateEdit-experience">${escapeHtml(candidate.experience)}</textarea></div>
              </div>
              <button class="primary" onclick="saveCandidate()">שמור פרטים</button>
            </div>

            <div id="tab-notes" class="tab-panel">
              <div class="grid">
                <div class="field"><label>סוג הערה</label><select id="noteType">${Object.entries(noteLabels).map(([v,l]) => `<option value="${v}">${l}</option>`).join('')}</select></div>
                <div class="field"><label>שם מראיין</label><input id="noteInterviewer"></div>
                <div class="field full"><label>הערה לאחר שיחה / ראיון</label><textarea id="noteText"></textarea></div>
              </div>
              <button class="primary" onclick="addNote()">הוסף הערה</button>
              <div style="margin-top:16px">${renderNotes(candidate.notes)}</div>
            </div>

            <div id="tab-send" class="tab-panel">
              <div class="grid">
                <div class="field"><label>מעסיק שמור</label><select id="sendEmployer"><option value="">בחירה ידנית</option>${state.employers.map(e => `<option value="${e._id}">${escapeHtml(e.businessName)} ${e.email ? '- ' + escapeHtml(e.email) : ''}</option>`).join('')}</select></div>
                <div class="field"><label>אימייל מעסיק</label><input id="sendEmployerEmail" type="email"></div>
                <div class="field"><label>שם עסק / מעסיק</label><input id="sendEmployerName"></div>
                <div class="field"><label>שם משרה</label><input id="sendJobTitle" value="${escapeHtml(candidate.applications?.[candidate.applications.length - 1]?.jobTitle || '')}"></div>
                <div class="field full"><label>הודעה למעסיק</label><textarea id="sendMessage">שלום, מצורפים פרטי מועמד לבדיקה.</textarea></div>
              </div>
              <div class="chips" style="margin-bottom:14px">
                <label class="chip"><input type="checkbox" id="sendCv" checked> קורות חיים</label>
                <label class="chip"><input type="checkbox" id="sendPhone" checked> סיכום שיחה</label>
                <label class="chip"><input type="checkbox" id="sendInterview" checked> סיכום ראיון</label>
                <label class="chip"><input type="checkbox" id="sendShareable" checked> הערות שמותר לשלוח</label>
              </div>
              <button class="blue" onclick="sendToEmployer()">שלח למעסיק</button>
            </div>

            <div id="tab-files" class="tab-panel">
              <p class="muted">אפשר להדפיס כרטיס מועמד או לשמור כקובץ PDF דרך חלון ההדפסה. בנוסף ניתן להוריד סיכום טקסט עם הערות המראיין.</p>
              <div class="row-actions">
                ${candidate.cv?.url ? `<a href="${candidate.cv.url}" target="_blank"><button>פתח קורות חיים מקוריים</button></a>` : '<span class="muted">לא צורפו קורות חיים</span>'}
                <button onclick="printCandidate()">הדפס / שמור PDF</button>
                <button onclick="downloadCandidateSummary()">הורד סיכום מועמד</button>
              </div>
              <div class="grid" style="margin-top:18px">
                <div class="field"><label>מייל מעסיק לטופס חתימה</label><input id="agreementEmployerEmail" type="email"></div>
                <div class="field"><label>שם מעסיק / עסק</label><input id="agreementEmployerName"></div>
                <div class="field"><label>שם משרה</label><input id="agreementJobTitle" value="${escapeHtml(candidate.applications?.[candidate.applications.length - 1]?.jobTitle || '')}"></div>
                <div class="field full"><label>נוסח התחייבות</label><textarea id="agreementTerms">המעסיק מאשר תשלום דמי השמה לאחר חודש עבודה מלא של המועמד, בהתאם להסכמות בין הצדדים.</textarea></div>
              </div>
              <button class="blue" onclick="sendPlacementAgreement()">שלח טופס חתימה דיגיטלי למעסיק</button>
            </div>
          </div>
        </div>`;
      modal.classList.add('open');
    }
    function inputField(id, label, value = '') {
      return `<div class="field"><label>${label}</label><input id="candidateEdit-${id}" value="${escapeHtml(value)}"></div>`;
    }
    function renderNotes(notes = []) {
      return notes.length ? notes.slice().reverse().map(n => `
        <div class="note"><small>${noteLabels[n.type] || n.type} | ${fmtDate(n.createdAt)} ${n.interviewer ? ' | ' + escapeHtml(n.interviewer) : ''}</small><div>${escapeHtml(String(n.text || '').replace('Candidate message:', 'הערות המועמד למשרה:'))}</div></div>
      `).join('') : '<div class="muted">אין הערות עדיין.</div>';
    }
    function showTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(t => t.classList.remove('active'));
      document.querySelector(`[onclick="showTab('${name}')"]`).classList.add('active');
      document.getElementById(`tab-${name}`).classList.add('active');
    }
    async function saveCandidate() {
      const c = state.currentCandidate;
      const body = {
        fullName: val('fullName'), identityNumber: val('identityNumber'), phone: val('phone'), email: val('email'), area: val('area'), city: val('city'),
        availability: val('availability'), salaryExpectations: val('salaryExpectations'), contactPerson: val('contactPerson'),
        experience: document.getElementById('candidateEdit-experience').value,
        categories: document.getElementById('candidateEdit-categories').value,
        status: document.getElementById('candidateEdit-status').value,
        priority: document.getElementById('candidateEdit-priority').value
      };
      await api(`/api/recruitment/admin/candidates/${c._id}`, { method: 'PATCH', body: JSON.stringify(body) });
      showToast('הפרטים נשמרו');
      await openCandidate(c._id);
      loadCandidates().catch(() => {});
    }
    function val(id) { return document.getElementById(`candidateEdit-${id}`).value; }
    async function quickStatus(id, status) {
      await api(`/api/recruitment/admin/candidates/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) });
      showToast('סטטוס עודכן');
      loadCandidates();
    }
    async function deleteCandidate(id, name) {
      if (!confirm(`למחוק את המועמד ${name}?`)) return;
      await api(`/api/recruitment/admin/candidates/${id}`, { method: 'DELETE' });
      showToast('המועמד נמחק');
      loadCandidates();
    }
    async function addNote() {
      const c = state.currentCandidate;
      await api(`/api/recruitment/admin/candidates/${c._id}/notes`, {
        method: 'POST',
        body: JSON.stringify({ type: document.getElementById('noteType').value, interviewer: document.getElementById('noteInterviewer').value, text: document.getElementById('noteText').value })
      });
      showToast('הערה נוספה');
      await openCandidate(c._id);
    }
    async function sendToEmployer() {
      const c = state.currentCandidate;
      const body = {
        employerContact: document.getElementById('sendEmployer').value || undefined,
        employerEmail: document.getElementById('sendEmployerEmail').value,
        employerName: document.getElementById('sendEmployerName').value,
        jobTitle: document.getElementById('sendJobTitle').value,
        message: document.getElementById('sendMessage').value,
        includeCv: document.getElementById('sendCv').checked,
        includePhoneNotes: document.getElementById('sendPhone').checked,
        includeInterviewNotes: document.getElementById('sendInterview').checked,
        includeShareableNotes: document.getElementById('sendShareable').checked
      };
      await api(`/api/recruitment/admin/candidates/${c._id}/send-to-employer`, { method: 'POST', body: JSON.stringify(body) });
      showToast('המועמד נשלח למעסיק');
      await openCandidate(c._id);
    }
    async function sendPlacementAgreement() {
      const c = state.currentCandidate;
      await api(`/api/recruitment/admin/candidates/${c._id}/send-placement-agreement`, {
        method: 'POST',
        body: JSON.stringify({
          employerEmail: document.getElementById('agreementEmployerEmail').value,
          employerName: document.getElementById('agreementEmployerName').value,
          jobTitle: document.getElementById('agreementJobTitle').value,
          feeTerms: document.getElementById('agreementTerms').value
        })
      });
      showToast('טופס החתימה נשלח למעסיק');
      await openCandidate(c._id);
    }
    function candidateSummary(c = state.currentCandidate) {
      return [
        `כרטיס מועמד: ${c.fullName}`,
        `תעודת זהות: ${c.identityNumber || '-'}`,
        `טלפון: ${c.phone}`,
        `אימייל: ${c.email || '-'}`,
        `אזור: ${c.area || c.city || '-'}`,
        `קטגוריות: ${(c.categories || []).join(', ') || '-'}`,
        `סטטוס: ${statusLabels[c.status] || c.status}`,
        `זמינות: ${c.availability || '-'}`,
        `ציפיות שכר: ${c.salaryExpectations || '-'}`,
        '',
        'ניסיון:',
        c.experience || '-',
        '',
        'הערות:',
        ...(c.notes || []).map(n => `${fmtDate(n.createdAt)} | ${noteLabels[n.type] || n.type} | ${String(n.text || '').replace('Candidate message:', 'הערות המועמד למשרה:')}`)
      ].join('\n');
    }
    function printCandidate() {
      document.getElementById('printCard').innerHTML = `<pre style="white-space:pre-wrap;font-family:Heebo,Arial,sans-serif;font-size:15px;line-height:1.7">${escapeHtml(candidateSummary())}</pre>`;
      window.print();
    }
    function downloadCandidateSummary() {
      const blob = new Blob([candidateSummary()], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${state.currentCandidate.fullName || 'candidate'}-summary.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function loadJobs() {
      state.jobs = await api('/api/admin/jobs');
      document.getElementById('jobsTable').innerHTML = state.jobs.length ? `
        <table><thead><tr><th>משרה</th><th>קטגוריה</th><th>אזור</th><th>שכר</th><th>סטטוס</th><th>מועמדים</th><th>פעולות</th></tr></thead><tbody>
          ${state.jobs.map(j => `<tr><td><strong>${escapeHtml(j.title)}</strong><div class="muted">${escapeHtml(j.description || '')}</div></td><td>${escapeHtml(j.category || j.profession)}</td><td>${escapeHtml(j.area)}</td><td>${j.hourlyRate ? '₪' + j.hourlyRate : '-'}</td><td>${j.status === 'closed' ? 'לא זמינה' : 'זמינה'}</td><td><button onclick="openJobCandidates('${j._id}', '${escapeHtml(j.title)}')">ראה מועמדים</button></td><td><div class="row-actions"><button onclick="openJobModal('${j._id}')">ערוך</button><button class="blue" onclick="toggleJobAvailability('${j._id}', '${j.status === 'closed' ? 'open' : 'closed'}')">${j.status === 'closed' ? 'הפוך לזמינה' : 'הפוך ללא זמינה'}</button><button class="danger" onclick="deleteJob('${j._id}', '${escapeHtml(j.title)}')">מחק</button></div></td></tr>`).join('')}
        </tbody></table>` : '<div style="padding:24px" class="muted">אין משרות עדיין.</div>';
    }
    async function openJobCandidates(jobId, title) {
      const candidates = await api(`/api/recruitment/admin/jobs/${jobId}/candidates`);
      document.getElementById('jobCandidatesModal').innerHTML = `
        <div class="dialog">
          <div class="dialog-head">
            <strong>מועמדים למשרה: ${escapeHtml(title)}</strong>
            <button onclick="closeModal('jobCandidatesModal')">סגור</button>
          </div>
          <div class="dialog-body">
            ${candidates.length ? renderCandidateTable(candidates, false) : '<div class="muted">אין מועמדים למשרה הזו עדיין.</div>'}
          </div>
        </div>`;
      document.getElementById('jobCandidatesModal').classList.add('open');
    }
    async function toggleJobAvailability(id, status) {
      await api(`/api/admin/jobs/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) });
      showToast(status === 'closed' ? 'המשרה הוגדרה כלא זמינה' : 'המשרה הוגדרה כזמינה');
      loadJobs();
    }
    async function deleteJob(id, title) {
      if (!confirm(`למחוק את המשרה ${title}?`)) return;
      await api(`/api/admin/jobs/${id}`, { method: 'DELETE' });
      showToast('המשרה נמחקה');
      loadJobs();
    }
    function openJobModal(id = '') {
      const job = state.jobs.find(j => j._id === id) || {};
      document.getElementById('jobModal').innerHTML = `
        <form class="dialog" onsubmit="saveJob(event, '${id}')">
          <div class="dialog-head"><strong>${id ? 'עריכת משרה' : 'משרה חדשה'}</strong><button type="button" onclick="closeModal('jobModal')">סגור</button></div>
          <div class="dialog-body grid">
            ${formField('job-title', 'שם משרה', job.title, true)}
            ${formField('job-category', 'קטגוריה', job.category || job.profession, true)}
            ${formField('job-area', 'אזור', job.area, true)}
            ${formField('job-address', 'כתובת', job.address)}
            ${formField('job-hourlyRate', 'שכר לשעה', job.hourlyRate || '', false, 'number')}
            ${formField('job-hours', 'שעות / משמרות', job.hours)}
            ${formField('job-days', 'ימים', (job.days || []).join(', '))}
            ${formField('job-employerName', 'שם מעסיק להצגה', job.employerName)}
            <div class="field"><label>סטטוס</label><select id="job-status"><option value="open" ${job.status !== 'closed' ? 'selected' : ''}>פתוחה</option><option value="closed" ${job.status === 'closed' ? 'selected' : ''}>סגורה</option><option value="draft" ${job.status === 'draft' ? 'selected' : ''}>טיוטה</option></select></div>
            <div class="field"><label>סוג</label><select id="job-jobType"><option ${job.jobType === 'קבועה' ? 'selected' : ''}>קבועה</option><option ${job.jobType === 'זמנית' ? 'selected' : ''}>זמנית</option></select></div>
            <div class="field full"><label>תיאור</label><textarea id="job-description">${escapeHtml(job.description)}</textarea></div>
            <div class="field full"><label>דרישות</label><textarea id="job-requirements">${escapeHtml(job.requirements)}</textarea></div>
            <div class="field full"><label>יתרונות / תנאים</label><textarea id="job-benefits">${escapeHtml(job.benefits)}</textarea></div>
          </div>
          <div class="dialog-foot"><button class="primary">שמור משרה</button></div>
        </form>`;
      document.getElementById('jobModal').classList.add('open');
    }
    function formField(id, label, value = '', required = false, type = 'text') {
      return `<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${escapeHtml(value)}" ${required ? 'required' : ''}></div>`;
    }
    async function saveJob(event, id) {
      event.preventDefault();
      const body = {
        title: document.getElementById('job-title').value,
        category: document.getElementById('job-category').value,
        profession: document.getElementById('job-category').value,
        area: document.getElementById('job-area').value,
        address: document.getElementById('job-address').value,
        hourlyRate: Number(document.getElementById('job-hourlyRate').value || 0),
        hours: document.getElementById('job-hours').value,
        days: document.getElementById('job-days').value.split(',').map(x => x.trim()).filter(Boolean),
        employerName: document.getElementById('job-employerName').value,
        status: document.getElementById('job-status').value,
        jobType: document.getElementById('job-jobType').value,
        description: document.getElementById('job-description').value,
        requirements: document.getElementById('job-requirements').value,
        benefits: document.getElementById('job-benefits').value
      };
      await api(id ? `/api/admin/jobs/${id}` : '/api/admin/jobs', { method: id ? 'PATCH' : 'POST', body: JSON.stringify(body) });
      closeModal('jobModal');
      showToast('המשרה נשמרה');
      loadJobs();
    }

    async function loadEmployers() {
      state.employers = await api('/api/recruitment/admin/employers');
      document.getElementById('employersTable').innerHTML = state.employers.length ? `
        <table><thead><tr><th>עסק</th><th>איש קשר</th><th>אימייל</th><th>טלפון</th><th>פעולות</th></tr></thead><tbody>
          ${state.employers.map(e => `<tr><td><strong>${escapeHtml(e.businessName)}</strong><div class="muted">${escapeHtml(e.field || '')} ${escapeHtml(e.area || '')}</div></td><td>${escapeHtml(e.contactName)}</td><td>${escapeHtml(e.email)}</td><td>${escapeHtml(e.phone)}</td><td><button onclick="openEmployerModal('${e._id}')">ערוך</button></td></tr>`).join('')}
        </tbody></table>` : '<div style="padding:24px" class="muted">אין מעסיקים שמורים.</div>';
    }
    function openEmployerModal(id = '') {
      const e = state.employers.find(x => x._id === id) || {};

        <form class="dialog" onsubmit="saveEmployer(event, '${id}')">

          <div class="dialog-body grid">
            ${formField('emp-businessName', 'שם עסק', e.businessName, true)}
            ${formField('emp-contactName', 'איש קשר', e.contactName)}
            ${formField('emp-email', 'אימייל', e.email, false, 'email')}
            ${formField('emp-phone', 'טלפון', e.phone)}
            ${formField('emp-field', 'תחום', e.field)}
            ${formField('emp-area', 'אזור', e.area)}
            <div class="field full"><label>הערות</label><textarea id="emp-notes">${escapeHtml(e.notes)}</textarea></div>
          </div>
          <div class="dialog-foot"><button class="primary">שמור מעסיק</button></div>
        </form>`;
      document.getElementById('employerModal').classList.add('open');

    async function saveEmployer(event, id) {
      event.preventDefault();
      const body = {
        businessName: document.getElementById('emp-businessName').value,
        contactName: document.getElementById('emp-contactName').value,
        email: document.getElementById('emp-email').value,
        phone: document.getElementById('emp-phone').value,
        field: document.getElementById('emp-field').value,
        area: document.getElementById('emp-area').value,
        notes: document.getElementById('emp-notes').value
      };
      await api(id ? `/api/recruitment/admin/employers/${id}` : '/api/recruitment/admin/employers', { method: id ? 'PATCH' : 'POST', body: JSON.stringify(body) });

      showToast('המעסיק נשמר');

    async function loadAgreements() {
      const params = new URLSearchParams();
      const q = document.getElementById('agreementQ')?.value || '';
      const status = document.getElementById('agreementStatus')?.value || '';
      if (q) params.set('q', q);
      if (status) params.set('status', status);
      const [stats, agreements] = await Promise.all([
        api('/api/agreements/admin/stats'),
        api(`/api/agreements/admin?${params}`)
      ]);
      state.agreements = agreements;
      document.getElementById('agreementStats').innerHTML = `
        <div class="card"><div class="metric">${stats.sent || 0}</div><div class="metric-label">נשלחו / נצפו</div></div>
        <div class="card"><div class="metric">${stats.signed || 0}</div><div class="metric-label">נחתמו</div></div>
        <div class="card"><div class="metric">${stats.waitingPayment || 0}</div><div class="metric-label">ממתינים לתשלום</div></div>
        <div class="card"><div class="metric">₪${Number(stats.openCollection || 0).toLocaleString('he-IL')}</div><div class="metric-label">פתוח לגבייה</div></div>
      `;
      document.getElementById('agreementsTable').innerHTML = agreements.length ? `
        <table><thead><tr><th>עסק</th><th>מועמד</th><th>משרה</th><th>סכום</th><th>סטטוס</th><th>פעולות</th></tr></thead><tbody>
          ${agreements.map(a => `<tr>
            <td><strong>${escapeHtml(a.businessName)}</strong><div class="muted">${escapeHtml(a.contactEmail || '')}</div></td>
            <td>${escapeHtml(a.candidateName)}<div class="muted">${escapeHtml(a.candidatePhone || '')}</div></td>
            <td>${escapeHtml(a.jobTitle || '-')}</td>
            <td>₪${Number(a.placementFee || 0).toLocaleString('he-IL')} + מע"מ</td>
            <td>${escapeHtml(agreementStatusLabels[a.status] || a.status)}</td>
            <td><div class="row-actions">
              <button onclick="sendAgreement('${a._id}')">שלח לחתימה</button>
              <button onclick="copyAgreementLink('${a.token}')">העתק קישור</button>
              ${a.candidate?._id ? `<button onclick="openCandidate('${a.candidate._id}')">פתח מועמד</button>` : ''}
              <button class="blue" onclick="markStartedWork('${a._id}')">העובד התחיל לעבוד</button>
              <button class="blue" onclick="markAgreementPaid('${a._id}', ${Number(a.placementFee || 0)})">סמן כשולם</button>
            </div></td>
          </tr>`).join('')}
        </tbody></table>` : '<div style="padding:24px" class="muted">אין הסכמי השמה להצגה.</div>';
    }

    function openAgreementModal() {
      document.getElementById('agreementModal').innerHTML = `
        <form class="dialog" onsubmit="saveAgreement(event)">
          <div class="dialog-head"><strong>יצירת הסכם השמה</strong><button type="button" onclick="closeModal('agreementModal')">סגור</button></div>
          <div class="dialog-body grid">
            <div class="field"><label>עסק</label><select id="agreementEmployer" onchange="fillAgreementEmployer()"><option value="">בחר עסק</option>${state.employers.map(e => `<option value="${e._id}">${escapeHtml(e.businessName)}</option>`).join('')}</select></div>
            <div class="field"><label>מועמד</label><select id="agreementCandidate" onchange="fillAgreementCandidate()"><option value="">בחר מועמד</option>${state.candidates.map(c => `<option value="${c._id}">${escapeHtml(c.fullName)} - ${escapeHtml(c.phone)}</option>`).join('')}</select></div>
            ${formField('agreement-businessName', 'שם העסק', '', true)}
            ${formField('agreement-businessId', 'ח.פ.')}
            ${formField('agreement-businessAddress', 'כתובת')}
            ${formField('agreement-contactName', 'איש קשר')}
            ${formField('agreement-contactPhone', 'טלפון')}
            ${formField('agreement-contactEmail', 'אימייל', '', true, 'email')}
            ${formField('agreement-candidateName', 'שם מועמד', '', true)}
            ${formField('agreement-candidatePhone', 'טלפון מועמד')}
            ${formField('agreement-candidateIdentityNumber', 'תעודת זהות מועמד')}
            ${formField('agreement-candidateRole', 'תפקיד')}
            ${formField('agreement-jobTitle', 'משרה')}
            ${formField('agreement-placementFee', 'סכום דמי השמה', '', true, 'number')}
            ${formField('agreement-vatPercent', 'אחוז מע"מ', '18', false, 'number')}
            <div class="field full"><label>הערות</label><textarea id="agreement-notes"></textarea></div>
          </div>
          <div class="dialog-foot"><button class="primary">הפק הסכם</button></div>
        </form>`;
      document.getElementById('agreementModal').classList.add('open');
    }

    function fillAgreementEmployer() {
      const e = state.employers.find(x => x._id === document.getElementById('agreementEmployer').value);
      if (!e) return;
      document.getElementById('agreement-businessName').value = e.businessName || '';
      document.getElementById('agreement-contactName').value = e.contactName || '';
      document.getElementById('agreement-contactPhone').value = e.phone || '';
      document.getElementById('agreement-contactEmail').value = e.email || '';
    }
    function fillAgreementCandidate() {
      const c = state.candidates.find(x => x._id === document.getElementById('agreementCandidate').value);
      if (!c) return;
      document.getElementById('agreement-candidateName').value = c.fullName || '';
      document.getElementById('agreement-candidatePhone').value = c.phone || '';
      document.getElementById('agreement-candidateIdentityNumber').value = c.identityNumber || '';
      document.getElementById('agreement-candidateRole').value = c.categories?.[0] || '';
    }

    async function saveAgreement(event) {
      event.preventDefault();
      const body = {
        employerContact: document.getElementById('agreementEmployer').value || undefined,
        candidate: document.getElementById('agreementCandidate').value || undefined,
        businessName: document.getElementById('agreement-businessName').value,
        businessId: document.getElementById('agreement-businessId').value,
        businessAddress: document.getElementById('agreement-businessAddress').value,
        contactName: document.getElementById('agreement-contactName').value,
        contactPhone: document.getElementById('agreement-contactPhone').value,
        contactEmail: document.getElementById('agreement-contactEmail').value,
        candidateName: document.getElementById('agreement-candidateName').value,
        candidatePhone: document.getElementById('agreement-candidatePhone').value,
        candidateIdentityNumber: document.getElementById('agreement-candidateIdentityNumber').value,
        candidateRole: document.getElementById('agreement-candidateRole').value,
        jobTitle: document.getElementById('agreement-jobTitle').value,
        placementFee: Number(document.getElementById('agreement-placementFee').value || 0),
        vatPercent: Number(document.getElementById('agreement-vatPercent').value || 18),
        notes: document.getElementById('agreement-notes').value
      };
      await api('/api/agreements/admin', { method: 'POST', body: JSON.stringify(body) });
      closeModal('agreementModal');
      showToast('הסכם השמה נוצר');
      showSection('agreements');
    }

    async function sendAgreement(id) {
      try {
        const result = await api(`/api/agreements/admin/${id}/send`, { method: 'POST', body: JSON.stringify({}) });
        if (result.link) await copyText(result.link);
        showToast(result.skipped ? 'SMTP לא מוגדר. הקישור הועתק, אפשר לשלוח ידנית.' : 'ההסכם נשלח לחתימה והקישור הועתק.');
        loadAgreements();
      } catch (err) {
        showToast(`שליחת ההסכם נכשלה: ${err.message}`);
      }
    }
    async function copyAgreementLink(token) {
      const link = `${location.origin}/pages/sign-agreement.html?token=${token}`;
      await copyText(link);
      showToast('קישור החתימה הועתק');
    }
    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (err) {
        prompt('העתק את הקישור:', text);
      }
    }
    async function markStartedWork(id) {
      const startedWorkingAt = prompt('תאריך תחילת עבודה YYYY-MM-DD');
      if (!startedWorkingAt) return;
      await api(`/api/agreements/admin/${id}/started-work`, { method: 'POST', body: JSON.stringify({ startedWorkingAt }) });
      showToast('ספירת 30 יום התחילה');
      loadAgreements();
    }
    async function markAgreementPaid(id, defaultAmount) {
      const paidAmount = prompt('סכום ששולם', defaultAmount || '');
      if (paidAmount === null) return;
      const paymentMethod = prompt('אמצעי תשלום', '');
      const invoiceNumber = prompt('מספר חשבונית', '');
      await api(`/api/agreements/admin/${id}/paid`, { method: 'POST', body: JSON.stringify({ paidAmount, paymentMethod, invoiceNumber }) });
      showToast('ההסכם סומן כשולם');
      loadAgreements();
    }

    async function loadSubmissions() {
      state.submissions = await api('/api/recruitment/admin/submissions');
      document.getElementById('submissionsTable').innerHTML = state.submissions.length ? `
        <table><thead><tr><th>מועמד</th><th>מעסיק</th><th>משרה</th><th>תאריך</th></tr></thead><tbody>
          ${state.submissions.map(s => `<tr><td>${escapeHtml(s.candidate?.fullName || '-')}</td><td>${escapeHtml(s.employerContact?.businessName || s.employerName || s.employerEmail || '-')}</td><td>${escapeHtml(s.jobTitle || '-')}</td><td>${fmtDate(s.sentAt)}</td></tr>`).join('')}
        </tbody></table>` : '<div style="padding:24px" class="muted">אין שליחות עדיין.</div>';
    }

    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    document.querySelectorAll('.modal').forEach(modal => modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); }));
    function logout() { localStorage.clear(); window.location = '/pages/login.html'; }

    Promise.all([loadEmployers(), loadJobs(), loadCandidates()]).then(loadOverview).catch(err => showToast(err.message));
  </script>
</body>
</html>
