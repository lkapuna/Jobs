<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פאנל ניהול — WorkHour</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2130;
      --border: rgba(255,255,255,0.07);
      --accent: #e94560;
      --accent2: #f5a623;
      --green: #22c55e;
      --blue: #3b82f6;
      --text: #e8eaf0;
      --muted: rgba(232,234,240,0.45);
      --sidebar-w: 240px;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      right: 0;
      top: 0;
      height: 100vh;
      z-index: 50;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-text { font-size: 1.5rem; font-weight: 900; color: var(--text); }
    .logo-text span { color: var(--accent); }
    .logo-sub { font-size: 0.72rem; color: var(--muted); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }

    .nav-section-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 12px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      margin-bottom: 2px;
    }

    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(233,69,96,0.12); color: var(--accent); }
    .nav-item .icon { font-size: 1.1rem; width: 22px; text-align: center; }

    .nav-badge {
      margin-right: auto;
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 20px;
    }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }

    .admin-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 10px;
    }

    .admin-avatar {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.9rem;
    }

    .admin-name { font-size: 0.88rem; font-weight: 600; }
    .admin-role { font-size: 0.72rem; color: var(--muted); }

    .logout-btn {
      margin-right: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .logout-btn:hover { color: var(--accent); }

    /* ── MAIN ── */
    .main {
      margin-right: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .page-title { font-size: 1.25rem; font-weight: 700; }
    .page-sub { font-size: 0.82rem; color: var(--muted); margin-top: 1px; }

    .topbar-actions { display: flex; gap: 10px; align-items: center; }

    .refresh-btn {
      padding: 8px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    .content { padding: 28px 32px; flex: 1; }

    /* ── SECTIONS ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 80px; height: 80px;
      border-radius: 50%;
      opacity: 0.08;
      transform: translate(20px, -20px);
    }

    .stat-card.red::before { background: var(--accent); }
    .stat-card.gold::before { background: var(--accent2); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.blue::before { background: var(--blue); }

    .stat-icon { font-size: 1.5rem; margin-bottom: 12px; }
    .stat-val { font-size: 2rem; font-weight: 900; line-height: 1; }
    .stat-card.red .stat-val { color: var(--accent); }
    .stat-card.gold .stat-val { color: var(--accent2); }
    .stat-card.green .stat-val { color: var(--green); }
    .stat-card.blue .stat-val { color: var(--blue); }
    .stat-label { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }

    /* ── TABLES ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title { font-size: 1rem; font-weight: 700; }
    .panel-count { font-size: 0.8rem; color: var(--muted); background: var(--surface2); padding: 3px 10px; border-radius: 20px; }

    .search-bar {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      flex: 1;
      padding: 9px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    .filter-select {
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 0.88rem;
      outline: none;
      cursor: pointer;
    }
    .filter-select option { background: var(--surface); }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 12px 20px;
      text-align: right;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 14px 20px;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .user-cell { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.85rem;
      flex-shrink: 0;
    }
    .avatar.worker { background: rgba(59,130,246,0.2); color: var(--blue); }
    .avatar.employer { background: rgba(245,166,35,0.2); color: var(--accent2); }

    .user-name { font-weight: 600; font-size: 0.9rem; }
    .user-email { font-size: 0.78rem; color: var(--muted); }

    /* BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge-worker { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-employer { background: rgba(245,166,35,0.15); color: var(--accent2); }
    .badge-active { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-blocked { background: rgba(233,69,96,0.15); color: var(--accent); }
    .badge-pending { background: rgba(245,166,35,0.15); color: var(--accent2); }
    .badge-approved { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-disputed { background: rgba(233,69,96,0.15); color: var(--accent); }

    /* ACTION BUTTONS */
    .action-btns { display: flex; gap: 6px; }

    .btn-sm {
      padding: 6px 12px;
      border-radius: 7px;
      font-family: 'Heebo', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .btn-sm-danger { background: rgba(233,69,96,0.1); color: var(--accent); border-color: rgba(233,69,96,0.2); }
    .btn-sm-danger:hover { background: rgba(233,69,96,0.2); }
    .btn-sm-success { background: rgba(34,197,94,0.1); color: var(--green); border-color: rgba(34,197,94,0.2); }
    .btn-sm-success:hover { background: rgba(34,197,94,0.2); }
    .btn-sm-primary { background: rgba(233,69,96,0.15); color: var(--accent); border-color: rgba(233,69,96,0.3); }
    .btn-sm-primary:hover { background: rgba(233,69,96,0.25); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 50px;
      color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* REVENUE SECTION */
    .revenue-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .revenue-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }

    .revenue-card h3 { font-size: 0.85rem; color: var(--muted); font-weight: 600; margin-bottom: 12px; }
    .revenue-big { font-size: 2.4rem; font-weight: 900; color: var(--green); }
    .revenue-sub { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }

    /* DISPUTE SECTION */
    .dispute-card {
      background: var(--surface);
      border: 1px solid rgba(233,69,96,0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 14px;
    }

    .dispute-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .dispute-parties { font-size: 0.88rem; }
    .dispute-parties strong { font-weight: 700; }
    .dispute-parties span { color: var(--muted); }
    .dispute-reason { font-size: 0.85rem; color: rgba(233,69,96,0.85); background: rgba(233,69,96,0.08); padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; }
    .dispute-meta { display: flex; gap: 20px; font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; }
    .dispute-actions { display: flex; gap: 8px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .toast.error { border-color: rgba(233,69,96,0.4); color: var(--accent); }

    /* PAGINATION */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 16px;
      border-top: 1px solid var(--border);
    }
    .page-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .page-btn:hover, .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-right: 0; }
      .content { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">Work<span>Hour</span></div>
    <div class="logo-sub">Admin Panel</div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">ראשי</div>
    <div class="nav-item active" onclick="navigate('overview')">
      <span class="icon">📊</span> סקירה כללית
    </div>

    <div class="nav-section-label">ניהול</div>
    <div class="nav-item" onclick="navigate('users')">
      <span class="icon">👥</span> משתמשים
    </div>
    <div class="nav-item" onclick="navigate('jobs')">
      <span class="icon">💼</span> משרות
    </div>
    <div class="nav-item" onclick="navigate('sessions')">
      <span class="icon">⏱️</span> משמרות
    </div>
    <div class="nav-item" onclick="navigate('disputes')">
      <span class="icon">⚠️</span> מחלוקות
      <span class="nav-badge" id="disputeBadge" style="display:none">0</span>
    </div>

    <div class="nav-section-label">כספים</div>
    <div class="nav-item" onclick="navigate('revenue')">
      <span class="icon">💰</span> הכנסות
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="admin-chip">
      <div class="admin-avatar">A</div>
      <div>
        <div class="admin-name">אדמין</div>
        <div class="admin-role">מנהל מערכת</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="יציאה">⏻</button>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title" id="pageTitle">סקירה כללית</div>
      <div class="page-sub" id="pageSub">ברוך הבא לפאנל הניהול</div>
    </div>
    <div class="topbar-actions">
      <button class="refresh-btn" onclick="refreshCurrent()">↻ רענן</button>
    </div>
  </div>

  <div class="content">

    <!-- ── OVERVIEW ── -->
    <div class="section active" id="section-overview">
      <div class="stats-grid" id="statsGrid">
        <div class="loading"><div class="spinner"></div>טוען...</div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">משתמשים אחרונים</span>
        </div>
        <div id="recentUsers"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- ── USERS ── -->
    <div class="section" id="section-users">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">כל המשתמשים</span>
          <span class="panel-count" id="usersCount">—</span>
        </div>
        <div class="search-bar">
          <input type="text" class="search-input" id="userSearch" placeholder="חיפוש לפי שם / אימייל..." oninput="filterUsers()">
          <select class="filter-select" id="roleFilter" onchange="filterUsers()">
            <option value="">כל התפקידים</option>
            <option value="worker">עובדים</option>
            <option value="employer">מעסיקים</option>
          </select>
        </div>
        <div id="usersTable"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- ── JOBS ── -->
    <div class="section" id="section-jobs">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">כל המשרות</span>
          <span class="panel-count" id="jobsCount">—</span>
        </div>
        <div class="search-bar">
          <input type="text" class="search-input" id="jobSearch" placeholder="חיפוש לפי שם משרה / אזור..." oninput="filterJobs()">
        </div>
        <div id="jobsTable"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- ── SESSIONS ── -->
    <div class="section" id="section-sessions">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">כל המשמרות</span>
          <span class="panel-count" id="sessionsCount">—</span>
        </div>
        <div class="search-bar">
          <select class="filter-select" id="sessionFilter" onchange="filterSessions()">
            <option value="">כל הסטטוסים</option>
            <option value="active">פעיל</option>
            <option value="pending_approval">ממתין לאישור</option>
            <option value="approved">מאושר</option>
            <option value="disputed">מחלוקת</option>
          </select>
        </div>
        <div id="sessionsTable"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- ── DISPUTES ── -->
    <div class="section" id="section-disputes">
      <div id="disputesList"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- ── REVENUE ── -->
    <div class="section" id="section-revenue">
      <div class="revenue-grid" id="revenueCards">
        <div class="loading"><div class="spinner"></div></div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">פירוט הכנסות לפי עובד</span>
        </div>
        <div id="revenueTable"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

  </div>
</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = '';
  let token = localStorage.getItem('token');
  let currentSection = 'overview';

  // ── DATA CACHE ──
  let cache = { users: null, jobs: null, sessions: null, disputes: null, stats: null };

  // ── AUTH CHECK ──
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token || user.role !== 'admin') window.location = '/pages/login.html';

  const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` });

  // ── NAVIGATION ──
  const pageMeta = {
    overview:  { title: 'סקירה כללית', sub: 'ברוך הבא לפאנל הניהול' },
    users:     { title: 'ניהול משתמשים', sub: 'כל העובדים והמעסיקים במערכת' },
    jobs:      { title: 'ניהול משרות', sub: 'כל המשרות הפעילות' },
    sessions:  { title: 'ניהול משמרות', sub: 'שעות עבודה ואישורים' },
    disputes:  { title: 'מחלוקות', sub: 'סכסוכים הממתינים להכרעה' },
    revenue:   { title: 'הכנסות', sub: 'מעקב עמלות ורווחי האפליקציה' },
  };

  function navigate(section) {
    currentSection = section;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll(`[onclick="navigate('${section}')"]`).forEach(el => el.classList.add('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(`section-${section}`).classList.add('active');
    document.getElementById('pageTitle').textContent = pageMeta[section].title;
    document.getElementById('pageSub').textContent = pageMeta[section].sub;
    loadSection(section);
  }

  function refreshCurrent() { cache[currentSection] = null; loadSection(currentSection); }

  function loadSection(section) {
    if (section === 'overview') loadOverview();
    else if (section === 'users') loadUsers();
    else if (section === 'jobs') loadJobs();
    else if (section === 'sessions') loadSessions();
    else if (section === 'disputes') loadDisputes();
    else if (section === 'revenue') loadRevenue();
  }

  // ── TOAST ──
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── FORMAT ──
  const fmt = (n) => new Intl.NumberFormat('he-IL').format(Math.round(n));
  const fmtDate = (d) => new Date(d).toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'2-digit' });
  const fmtTime = (d) => new Date(d).toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });

  function roleBadge(role) {
    if (role === 'worker') return '<span class="badge badge-worker">👷 עובד</span>';
    if (role === 'employer') return '<span class="badge badge-employer">🏢 מעסיק</span>';
    return '<span class="badge">אדמין</span>';
  }

  function statusBadge(status) {
    const map = {
      active: ['badge-active','פעיל ✓'],
      pending_approval: ['badge-pending','ממתין ⏳'],
      approved: ['badge-approved','מאושר ✓'],
      disputed: ['badge-disputed','מחלוקת ⚠️'],
      corrected: ['badge-pending','תוקן'],
    };
    const [cls, label] = map[status] || ['','—'];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  // ── OVERVIEW ──
  async function loadOverview() {
    try {
      const [statsRes, usersRes] = await Promise.all([
        fetch(`${API}/api/admin/stats`, { headers: headers() }),
        fetch(`${API}/api/admin/users`, { headers: headers() })
      ]);
      const stats = await statsRes.json();
      const users = await usersRes.json();

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card red">
          <div class="stat-icon">👷</div>
          <div class="stat-val">${fmt(stats.workers || 0)}</div>
          <div class="stat-label">עובדים רשומים</div>
        </div>
        <div class="stat-card gold">
          <div class="stat-icon">🏢</div>
          <div class="stat-val">${fmt(stats.employers || 0)}</div>
          <div class="stat-label">מעסיקים רשומים</div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon">⏱️</div>
          <div class="stat-val">${fmt(stats.totalHours || 0)}</div>
          <div class="stat-label">שעות עבודה כולל</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon">💰</div>
          <div class="stat-val">₪${fmt(stats.totalRevenue || 0)}</div>
          <div class="stat-label">רווח האפליקציה</div>
        </div>
      `;

      const recent = Array.isArray(users) ? users.slice(0, 8) : [];
      document.getElementById('recentUsers').innerHTML = recent.length ? `
        <table>
          <thead><tr>
            <th>שם</th><th>תפקיד</th><th>תאריך הרשמה</th><th>סטטוס</th>
          </tr></thead>
          <tbody>
            ${recent.map(u => `
              <tr>
                <td>
                  <div class="user-cell">
                    <div class="avatar ${u.role}">${(u.firstName || u.businessName || 'A')[0]}</div>
                    <div>
                      <div class="user-name">${u.firstName ? `${u.firstName} ${u.lastName}` : u.businessName}</div>
                      <div class="user-email">${u.email}</div>
                    </div>
                  </div>
                </td>
                <td>${roleBadge(u.role)}</td>
                <td>${fmtDate(u.createdAt)}</td>
                <td><span class="badge ${u.isActive ? 'badge-active' : 'badge-blocked'}">${u.isActive ? 'פעיל' : 'חסום'}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : '<div class="empty-state"><div class="empty-icon">👤</div><p>אין משתמשים עדיין</p></div>';

    } catch(e) {
      document.getElementById('statsGrid').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>שגיאה בטעינת נתונים</p></div>';
    }
  }

  // ── USERS ──
  let allUsers = [];

  async function loadUsers() {
    if (cache.users) { renderUsers(cache.users); return; }
    document.getElementById('usersTable').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const res = await fetch(`${API}/api/admin/users`, { headers: headers() });
      allUsers = await res.json();
      cache.users = allUsers;
      renderUsers(allUsers);
    } catch(e) { showToast('שגיאה בטעינת משתמשים', 'error'); }
  }

  function filterUsers() {
    const q = document.getElementById('userSearch').value.toLowerCase();
    const role = document.getElementById('roleFilter').value;
    const filtered = allUsers.filter(u => {
      const name = (u.firstName ? `${u.firstName} ${u.lastName}` : u.businessName || '').toLowerCase();
      const matchQ = !q || name.includes(q) || u.email.includes(q);
      const matchRole = !role || u.role === role;
      return matchQ && matchRole;
    });
    renderUsers(filtered);
  }

  function renderUsers(users) {
    document.getElementById('usersCount').textContent = `${users.length} משתמשים`;
    document.getElementById('usersTable').innerHTML = users.length ? `
      <table>
        <thead><tr>
          <th>שם</th><th>תפקיד</th><th>טלפון</th><th>הצטרף</th><th>סטטוס</th><th>פעולות</th>
        </tr></thead>
        <tbody>
          ${users.filter(u => u.role !== 'admin').map(u => `
            <tr>
              <td>
                <div class="user-cell">
                  <div class="avatar ${u.role}">${(u.firstName || u.businessName || 'A')[0]}</div>
                  <div>
                    <div class="user-name">${u.firstName ? `${u.firstName} ${u.lastName}` : u.businessName}</div>
                    <div class="user-email">${u.email}</div>
                  </div>
                </div>
              </td>
              <td>${roleBadge(u.role)}</td>
              <td style="color:var(--muted);font-size:0.85rem">${u.phone || '—'}</td>
              <td style="color:var(--muted);font-size:0.85rem">${fmtDate(u.createdAt)}</td>
              <td><span class="badge ${u.isActive ? 'badge-active' : 'badge-blocked'}">${u.isActive ? 'פעיל' : 'חסום'}</span></td>
              <td>
                <div class="action-btns">
                  ${u.isActive
                    ? `<button class="btn-sm btn-sm-danger" onclick="toggleBlock('${u._id}', false)">🚫 חסום</button>`
                    : `<button class="btn-sm btn-sm-success" onclick="toggleBlock('${u._id}', true)">✓ שחרר</button>`
                  }
                  <button class="btn-sm btn-sm-danger" onclick="deleteUser('${u._id}', '${u.firstName || u.businessName || u.email}')">🗑️ מחק</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : '<div class="empty-state"><div class="empty-icon">🔍</div><p>לא נמצאו תוצאות</p></div>';
  }

  async function toggleBlock(userId, isActive) {
    try {
      const res = await fetch(`${API}/api/admin/users/${userId}/block`, {
        method: 'PATCH',
        headers: headers(),
        body: JSON.stringify({ isActive })
      });
      if (!res.ok) throw new Error();
      cache.users = null;
      showToast(isActive ? 'המשתמש שוחרר בהצלחה' : 'המשתמש נחסם בהצלחה');
      loadUsers();
    } catch(e) { showToast('שגיאה בפעולה', 'error'); }
  }

  async function deleteUser(userId, name) {
    if (!confirm(`למחוק את ${name}? לא ניתן לבטל!`)) return;
    try {
      const res = await fetch(`${API}/api/admin/users/${userId}`, { method: 'DELETE', headers: headers() });
      if (!res.ok) throw new Error();
      cache.users = null;
      showToast('המשתמש נמחק');
      loadUsers();
    } catch(e) { showToast('שגיאה במחיקה', 'error'); }
  }

  // ── JOBS ──
  let allJobs = [];
  let editingJobId = null;

  async function loadJobs() {
    if (cache.jobs) { renderJobs(cache.jobs); return; }
    document.getElementById('jobsTable').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const res = await fetch(`${API}/api/admin/jobs`, { headers: headers() });
      allJobs = res.ok ? await res.json() : [];
      cache.jobs = allJobs;
      renderJobs(allJobs);
    } catch(e) { showToast('שגיאה בטעינת משרות', 'error'); }
  }

  function filterJobs() {
    const q = document.getElementById('jobSearch').value.toLowerCase();
    const filtered = allJobs.filter(j =>
      !q || j.title.toLowerCase().includes(q) || j.area.toLowerCase().includes(q)
    );
    renderJobs(filtered);
  }

  function renderJobs(jobs) {
    document.getElementById('jobsCount').textContent = `${jobs.length} משרות`;
    document.getElementById('jobsTable').innerHTML = jobs.length ? `
      <table>
        <thead><tr>
          <th>שם המשרה</th><th>מעסיק</th><th>אזור</th><th>שכר/שעה</th><th>סוג</th><th>מועמדים</th><th>סטטוס</th><th>פעולות</th>
        </tr></thead>
        <tbody>
          ${jobs.map(j => `
            <tr>
              <td><strong>${j.title}</strong></td>
              <td style="color:var(--muted);font-size:0.85rem">${j.employer?.businessName || '—'}</td>
              <td style="color:var(--muted);font-size:0.85rem">${j.area}</td>
              <td><span style="color:var(--green);font-weight:700">₪${j.hourlyRate}</span></td>
              <td><span class="badge ${j.jobType === 'קבועה' ? 'badge-approved' : 'badge-pending'}">${j.jobType}</span></td>
              <td style="text-align:center">${j.applicants?.length || 0}</td>
              <td><span class="badge ${j.isActive ? 'badge-active' : 'badge-blocked'}">${j.isActive ? 'פעילה' : 'לא פעילה'}</span></td>
              <td>
                <div class="action-btns">
                  <button class="btn-sm btn-sm-primary" onclick="openEditJob('${j._id}','${j.title}','${j.area}',${j.hourlyRate},'${j.jobType}','${j.profession||''}')">✏️ ערוך</button>
                  <button class="btn-sm btn-sm-danger" onclick="deleteJob('${j._id}','${j.title}')">🗑️ מחק</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : '<div class="empty-state"><div class="empty-icon">💼</div><p>אין משרות עדיין</p></div>';
  }

  async function deleteJob(jobId, title) {
    if (!confirm(`למחוק את המשרה "${title}"?`)) return;
    try {
      const res = await fetch(`${API}/api/admin/jobs/${jobId}`, { method: 'DELETE', headers: headers() });
      if (!res.ok) throw new Error();
      cache.jobs = null;
      showToast('המשרה נמחקה');
      loadJobs();
    } catch(e) { showToast('שגיאה במחיקה', 'error'); }
  }

  function openEditJob(id, title, area, rate, type, profession) {
    editingJobId = id;
    document.getElementById('editJobTitle').value = title;
    document.getElementById('editJobArea').value = area;
    document.getElementById('editJobRate').value = rate;
    document.getElementById('editJobType').value = type;
    document.getElementById('editJobProfession').value = profession;
    document.getElementById('editJobModal').style.display = 'flex';
  }

  async function saveEditJob() {
    try {
      const res = await fetch(`${API}/api/admin/jobs/${editingJobId}`, {
        method: 'PATCH', headers: headers(),
        body: JSON.stringify({
          title: document.getElementById('editJobTitle').value,
          area: document.getElementById('editJobArea').value,
          hourlyRate: Number(document.getElementById('editJobRate').value),
          jobType: document.getElementById('editJobType').value,
          profession: document.getElementById('editJobProfession').value,
        })
      });
      if (!res.ok) throw new Error();
      cache.jobs = null;
      document.getElementById('editJobModal').style.display = 'none';
      showToast('המשרה עודכנה ✓');
      loadJobs();
    } catch(e) { showToast('שגיאה בעדכון', 'error'); }
  }

  // ── SESSIONS ──
  let allSessions = [];

  async function loadSessions() {
    document.getElementById('sessionsTable').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      // נביא את כל המשמרות דרך endpoint עם הרשאת אדמין
      const res = await fetch(`${API}/api/admin/sessions`, { headers: headers() });
      allSessions = res.ok ? await res.json() : [];
      renderSessions(allSessions);
    } catch(e) {
      document.getElementById('sessionsTable').innerHTML = '<div class="empty-state"><div class="empty-icon">⏱️</div><p>אין משמרות לתצוגה</p></div>';
    }
  }

  function filterSessions() {
    const status = document.getElementById('sessionFilter').value;
    const filtered = status ? allSessions.filter(s => s.status === status) : allSessions;
    renderSessions(filtered);
  }

  function renderSessions(sessions) {
    document.getElementById('sessionsCount').textContent = `${sessions.length} משמרות`;
    document.getElementById('sessionsTable').innerHTML = sessions.length ? `
      <table>
        <thead><tr>
          <th>עובד</th><th>מעסיק</th><th>תאריך</th><th>שעות</th><th>שכר נטו</th><th>סטטוס</th>
        </tr></thead>
        <tbody>
          ${sessions.map(s => `
            <tr>
              <td>${s.worker?.firstName ? `${s.worker.firstName} ${s.worker.lastName}` : '—'}</td>
              <td>${s.employer?.businessName || '—'}</td>
              <td style="color:var(--muted);font-size:0.85rem">${fmtDate(s.date)}</td>
              <td><strong>${s.totalHours}h</strong></td>
              <td style="color:var(--green);font-weight:700">₪${fmt(s.netWorkerPay)}</td>
              <td>${statusBadge(s.status)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : '<div class="empty-state"><div class="empty-icon">⏱️</div><p>אין משמרות</p></div>';
  }

  // ── DISPUTES ──
  async function loadDisputes() {
    document.getElementById('disputesList').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const res = await fetch(`${API}/api/admin/sessions/disputes`, { headers: headers() });
      const disputes = await res.json();

      document.getElementById('disputeBadge').textContent = disputes.length;
      document.getElementById('disputeBadge').style.display = disputes.length ? 'inline' : 'none';

      document.getElementById('disputesList').innerHTML = disputes.length ? disputes.map(d => `
        <div class="dispute-card" id="dispute-${d._id}">
          <div class="dispute-header">
            <div class="dispute-parties">
              <strong>👷 ${d.worker?.firstName} ${d.worker?.lastName}</strong>
              <span> vs </span>
              <strong>🏢 ${d.employer?.businessName}</strong>
            </div>
            ${statusBadge(d.status)}
          </div>
          <div class="dispute-reason">⚠️ ${d.disputeReason || 'לא צוין סיבה'}</div>
          <div class="dispute-meta">
            <span>📅 ${fmtDate(d.date)}</span>
            <span>⏱️ ${d.totalHours} שעות</span>
            <span>💰 ₪${fmt(d.grossPay)}</span>
            <span>📞 עובד: ${d.worker?.phone || '—'}</span>
          </div>
          <div class="dispute-actions">
            <button class="btn-sm btn-sm-success" onclick="resolveDispute('${d._id}', 'worker')">✓ לטובת העובד</button>
            <button class="btn-sm btn-sm-primary" onclick="resolveDispute('${d._id}', 'employer')">✓ לטובת המעסיק</button>
          </div>
        </div>
      `).join('') : '<div class="empty-state"><div class="empty-icon">✅</div><p>אין מחלוקות פתוחות</p></div>';

    } catch(e) {
      document.getElementById('disputesList').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>שגיאה בטעינה</p></div>';
    }
  }

  async function resolveDispute(id, favor) {
    try {
      const res = await fetch(`${API}/api/admin/sessions/${id}/resolve`, {
        method: 'PATCH',
        headers: headers(),
        body: JSON.stringify({ favor })
      });
      if (!res.ok) throw new Error();
      document.getElementById(`dispute-${id}`).remove();
      showToast('המחלוקת נסגרה בהצלחה ✓');
    } catch(e) { showToast('שגיאה בסגירת מחלוקת', 'error'); }
  }

  // ── REVENUE ──
  async function loadRevenue() {
    document.getElementById('revenueCards').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const res = await fetch(`${API}/api/admin/stats`, { headers: headers() });
      const stats = await res.json();

      document.getElementById('revenueCards').innerHTML = `
        <div class="revenue-card">
          <h3>💰 סה"כ רווח האפליקציה</h3>
          <div class="revenue-big">₪${fmt(stats.totalRevenue || 0)}</div>
          <div class="revenue-sub">מתוך ${fmt(stats.totalHours || 0)} שעות עבודה מאושרות</div>
        </div>
        <div class="revenue-card">
          <h3>📊 עמלה ממוצעת לעסקה</h3>
          <div class="revenue-big" style="color:var(--accent2)">₪6</div>
          <div class="revenue-sub">3 ₪ מהעובד + 3 ₪ מהמעסיק לכל שעה</div>
        </div>
      `;

      document.getElementById('revenueTable').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📈</div>
          <p>פירוט מפורט יהיה זמין לאחר ביצוע משמרות</p>
        </div>
      `;
    } catch(e) {
      document.getElementById('revenueCards').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>שגיאה בטעינה</p></div>';
    }
  }

  function logout() {
    localStorage.clear();
    window.location = '/pages/login.html';
  }

  // ── INIT ──
  loadOverview();
  // בדיקת מחלוקות לתצוגת badge
  fetch(`${API}/api/admin/sessions/disputes`, { headers: headers() })
    .then(r => r.json())
    .then(d => {
      if (d.length) {
        document.getElementById('disputeBadge').textContent = d.length;
        document.getElementById('disputeBadge').style.display = 'inline';
      }
    }).catch(() => {});
</script>

<div id="excelModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:420px">
    <h3 style="font-size:1.2rem;font-weight:800;margin-bottom:20px">📥 הורדת דוח Excel</h3>
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:0.8rem;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase">סנן לפי</label>
      <select id="excelFilterType" style="width:100%;padding:11px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:Heebo,sans-serif;font-size:0.9rem;outline:none" onchange="updateExcelFilter()">
        <option value="all">כל המשמרות</option>
        <option value="employer">לפי מעסיק</option>
        <option value="worker">לפי עובד</option>
      </select>
    </div>
    <div id="excelUserSelect" style="display:none;margin-bottom:16px">
      <label style="display:block;font-size:0.8rem;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase">בחר</label>
      <select id="excelUserId" style="width:100%;padding:11px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:Heebo,sans-serif;font-size:0.9rem;outline:none">
        <option value="">טוען...</option>
      </select>
    </div>
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:0.8rem;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase">סטטוס</label>
      <select id="excelStatus" style="width:100%;padding:11px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:Heebo,sans-serif;font-size:0.9rem;outline:none">
        <option value="">הכל</option>
        <option value="approved">מאושר בלבד</option>
        <option value="pending_approval">ממתין לאישור</option>
        <option value="disputed">מחלוקות</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button onclick="document.getElementById('excelModal').style.display='none'" style="padding:10px 20px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:Heebo,sans-serif;font-weight:700;cursor:pointer">ביטול</button>
      <button onclick="downloadAdminExcelFiltered()" style="padding:10px 24px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-family:Heebo,sans-serif;font-weight:700;cursor:pointer">📥 הורד</button>
    </div>
  </div>
</div>

<script>
  function showExcelFilterModal() {
    document.getElementById('excelModal').style.display = 'flex';
    updateExcelFilter();
  }

  async function updateExcelFilter() {
    const type = document.getElementById('excelFilterType').value;
    const sel = document.getElementById('excelUserSelect');
    const userSel = document.getElementById('excelUserId');
    if (type === 'all') { sel.style.display = 'none'; return; }
    sel.style.display = 'block';
    try {
      const res = await fetch('/api/admin/users', { headers: headers() });
      const users = res.ok ? await res.json() : [];
      const filtered = users.filter(u => u.role === (type === 'employer' ? 'employer' : 'worker'));
      userSel.innerHTML = filtered.map(u => `<option value="${u._id}">${u.businessName || u.firstName + ' ' + u.lastName}</option>`).join('');
    } catch(e) {}
  }

  async function downloadAdminExcel(filterType, userId, status) {
    try {
      showToast('מכין קובץ Excel...');
      const res = await fetch('/api/admin/sessions', { headers: headers() });
      let sessions = res.ok ? await res.json() : [];

      if (filterType === 'employer' && userId) sessions = sessions.filter(s => s.employer?._id === userId || s.employer === userId);
      if (filterType === 'worker' && userId) sessions = sessions.filter(s => s.worker?._id === userId || s.worker === userId);
      if (status) sessions = sessions.filter(s => s.status === status);

      const fmtD = d => d ? new Date(d).toLocaleDateString('he-IL') : '';
      const fmtT = d => d ? new Date(d).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}) : '';

      const rows = [['עובד','מעסיק','תאריך','שעת התחלה','שעת סיום','שעות','שכר גולמי','שכר נטו עובד','עלות מעסיק','סטטוס']];
      sessions.forEach(s => rows.push([
        `${s.worker?.firstName||''} ${s.worker?.lastName||''}`,
        s.employer?.businessName || '—',
        fmtD(s.date),
        fmtT(s.startTime),
        fmtT(s.endTime),
        s.totalHours,
        s.grossPay,
        s.netWorkerPay,
        s.totalEmployerCost,
        s.status === 'approved' ? 'מאושר' : s.status === 'pending_approval' ? 'ממתין' : s.status
      ]));

      const csv = '\uFEFF' + rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `דוח_שעות_WorkHour_${new Date().toLocaleDateString('he-IL').replace(/\//g,'-')}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('הקובץ הורד בהצלחה ✓');
    } catch(e) { showToast('שגיאה', 'error'); }
  }

  function downloadAdminExcelFiltered() {
    const type = document.getElementById('excelFilterType').value;
    const userId = document.getElementById('excelUserId').value;
    const status = document.getElementById('excelStatus').value;
    document.getElementById('excelModal').style.display = 'none';
    downloadAdminExcel(type, userId, status);
  }
</script>

</body>
</html>
