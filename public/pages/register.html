<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשמה — WorkHour</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1a1a2e;
      --accent: #e94560;
      --gold: #f5a623;
      --light: #f8f9fa;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--primary);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .register-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 520px;
    }

    /* Toggle */
    .type-toggle {
      display: flex;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 36px;
    }

    .type-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .type-btn.active {
      background: var(--accent);
      color: #fff;
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      margin-bottom: 7px;
    }

    input, select, textarea {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.1);
    }

    select option { background: #1a1a2e; }

    textarea { resize: vertical; min-height: 80px; }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s;
    }

    .submit-btn:hover {
      background: #c73652;
      transform: translateY(-1px);
    }

    .submit-btn.employer { background: var(--gold); color: var(--primary); }
    .submit-btn.employer:hover { background: #e09400; }

    .login-link {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.45);
      font-size: 0.9rem;
    }

    .login-link a { color: var(--accent); text-decoration: none; font-weight: 600; }

    .error-msg {
      background: rgba(233,69,96,0.1);
      border: 1px solid rgba(233,69,96,0.3);
      color: #ff6b6b;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 0.9rem;
      display: none;
    }

    .success-msg {
      background: rgba(40,167,69,0.1);
      border: 1px solid rgba(40,167,69,0.3);
      color: #51cf66;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">Work<span>Hour</span></a>
  <a href="/pages/login.html" style="color:rgba(255,255,255,0.6);text-decoration:none;font-size:0.9rem;">כבר רשום? התחבר</a>
</nav>

<div class="main">
  <div class="register-box">

    <div class="type-toggle">
      <button class="type-btn active" id="workerBtn" onclick="setType('worker')">👷 אני עובד</button>
      <button class="type-btn" id="employerBtn" onclick="setType('employer')">🏢 אני מעסיק</button>
    </div>

    <h2 id="formTitle">הרשמה כעובד</h2>
    <p class="subtitle" id="formSub">הצטרף ומצא עבודה לפי שעות</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- טופס עובד -->
    <form id="workerForm">
      <div class="form-row">
        <div class="form-group">
          <label>שם פרטי *</label>
          <input type="text" id="w_firstName" placeholder="ישראל" required>
        </div>
        <div class="form-group">
          <label>שם משפחה *</label>
          <input type="text" id="w_lastName" placeholder="ישראלי" required>
        </div>
      </div>
      <div class="form-group">
        <label>אימייל *</label>
        <input type="email" id="w_email" placeholder="example@email.com" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>טלפון *</label>
          <input type="tel" id="w_phone" placeholder="050-0000000" required>
        </div>
        <div class="form-group">
          <label>סיסמה *</label>
          <input type="password" id="w_password" placeholder="לפחות 6 תווים" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>אזור עבודה *</label>
          <select id="w_area" required>
            <option value="">בחר אזור</option>
            <option>תל אביב והמרכז</option>
            <option>ירושלים</option>
            <option>חיפה והצפון</option>
            <option>באר שבע והדרום</option>
            <option>השרון</option>
            <option>שפלה</option>
          </select>
        </div>
        <div class="form-group">
          <label>מקצוע *</label>
          <input type="text" id="w_profession" placeholder="שירות, מחסן..." required>
        </div>
      </div>
      <div class="form-group">
        <label>סוג עבודה</label>
        <select id="w_jobType">
          <option value="זמנית">זמנית</option>
          <option value="קבועה">קבועה</option>
        </select>
      </div>
      <div class="form-group">
        <label>תיאור קצר על עצמך</label>
        <textarea id="w_description" placeholder="ספר קצת על הניסיון שלך..."></textarea>
      </div>
      <button type="submit" class="submit-btn">הרשמה כעובד</button>
    </form>

    <!-- טופס מעסיק -->
    <form id="employerForm" style="display:none">
      <div class="form-group">
        <label>שם העסק *</label>
        <input type="text" id="e_businessName" placeholder="חברת אבג בע״מ" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>שם איש קשר *</label>
          <input type="text" id="e_contactName" placeholder="שם מלא" required>
        </div>
        <div class="form-group">
          <label>טלפון *</label>
          <input type="tel" id="e_phone" placeholder="050-0000000" required>
        </div>
      </div>
      <div class="form-group">
        <label>אימייל *</label>
        <input type="email" id="e_email" placeholder="business@email.com" required>
      </div>
      <div class="form-group">
        <label>סיסמה *</label>
        <input type="password" id="e_password" placeholder="לפחות 6 תווים" required>
      </div>
      <div class="form-group">
        <label>כתובת העסק *</label>
        <input type="text" id="e_address" placeholder="רחוב, עיר" required>
      </div>
      <div class="form-group">
        <label>תחום העסק</label>
        <select id="e_field">
          <option value="">בחר תחום</option>
          <option>מסחר וקמעונאות</option>
          <option>אירוח ומסעדנות</option>
          <option>לוגיסטיקה ומחסנים</option>
          <option>ניקיון ותחזוקה</option>
          <option>שמירה ואבטחה</option>
          <option>בנייה ועבודות שדה</option>
          <option>אחר</option>
        </select>
      </div>
      <button type="submit" class="submit-btn employer">הרשמה כמעסיק</button>
    </form>

    <div class="login-link">
      כבר יש לך חשבון? <a href="/pages/login.html">התחבר כאן</a>
    </div>
  </div>
</div>

<script>
  let currentType = 'worker';

  // קריאת פרמטר מה-URL
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('type') === 'employer') setType('employer');

  function setType(type) {
    currentType = type;
    document.getElementById('workerBtn').classList.toggle('active', type === 'worker');
    document.getElementById('employerBtn').classList.toggle('active', type === 'employer');
    document.getElementById('workerForm').style.display = type === 'worker' ? 'block' : 'none';
    document.getElementById('employerForm').style.display = type === 'employer' ? 'block' : 'none';
    document.getElementById('formTitle').textContent = type === 'worker' ? 'הרשמה כעובד' : 'הרשמה כמעסיק';
    document.getElementById('formSub').textContent = type === 'worker' ? 'הצטרף ומצא עבודה לפי שעות' : 'פרסם משרות ומצא עובדים';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  // הרשמת עובד
  document.getElementById('workerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('.submit-btn');
    btn.textContent = 'שולח...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/register/worker', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          firstName: document.getElementById('w_firstName').value,
          lastName: document.getElementById('w_lastName').value,
          email: document.getElementById('w_email').value,
          phone: document.getElementById('w_phone').value,
          password: document.getElementById('w_password').value,
          area: document.getElementById('w_area').value,
          profession: document.getElementById('w_profession').value,
          jobType: document.getElementById('w_jobType').value,
          description: document.getElementById('w_description').value
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showSuccess('נרשמת בהצלחה! מעביר אותך...');
      setTimeout(() => window.location = '/pages/worker-dashboard.html', 1200);
    } catch (err) {
      showError(err.message);
      btn.textContent = 'הרשמה כעובד';
      btn.disabled = false;
    }
  });

  // הרשמת מעסיק
  document.getElementById('employerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('.submit-btn');
    btn.textContent = 'שולח...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/register/employer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          businessName: document.getElementById('e_businessName').value,
          contactName: document.getElementById('e_contactName').value,
          phone: document.getElementById('e_phone').value,
          email: document.getElementById('e_email').value,
          password: document.getElementById('e_password').value,
          businessAddress: document.getElementById('e_address').value,
          businessField: document.getElementById('e_field').value
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showSuccess('נרשמת בהצלחה! מעביר אותך...');
      setTimeout(() => window.location = '/pages/employer-dashboard.html', 1200);
    } catch (err) {
      showError(err.message);
      btn.textContent = 'הרשמה כמעסיק';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
