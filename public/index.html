<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>א.ש השמת עובדים - משרות פתוחות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f4f6f8;
      --ink: #18212f;
      --muted: #667085;
      --line: #d9e0e8;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --warning: #b45309;
      --danger: #b42318;
    }
    body {
      margin: 0;
      font-family: Heebo, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .bar, .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }
    .bar {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 72px;
      gap: 16px;
      position: relative;
    }
    .brand {
      font-size: clamp(1.15rem, 2.6vw, 1.8rem);
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: #050b18;
      text-shadow:
        1px 0 #c9972b,
        -1px 0 #c9972b,
        0 1px #c9972b,
        0 -1px #c9972b,
        1px 1px #c9972b,
        -1px -1px #c9972b;
    }
    .brand-logo {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      object-fit: contain;
      background: #fff;
      border: 1px solid var(--line);
    }
    .brand-name { white-space: nowrap; }
    .top-actions { display: none; }
    .top-actions { display: flex; gap: 10px; align-items: center; }
    .version-chip {
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      font-weight: 800;
      direction: ltr;
    }
    a.btn, button {
      font-family: inherit;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary, button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover, button.primary:hover { background: var(--accent-strong); }
    .hero {
      padding: 42px 0 24px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
    }
    .filters {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 12px;
      margin: 24px 0;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.95rem;
      background: #fff;
      color: var(--ink);
    }
    textarea { min-height: 96px; resize: vertical; }
    .jobs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding-bottom: 50px;
    }
    .job {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 290px;
    }
    .job h2 {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.25;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      border: 1px solid #cfd8e3;
      color: #475467;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.82rem;
      background: #f8fafc;
      white-space: nowrap;
    }
    .pay {
      color: var(--accent-strong);
      font-size: 1.5rem;
      font-weight: 900;
    }
    .desc {
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
      white-space: pre-line;
    }
    .job-details {
      display: grid;
      gap: 8px;
      color: #344054;
      font-size: 0.9rem;
      line-height: 1.55;
      margin-top: -4px;
    }
    .job-details div {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      white-space: pre-line;
    }
    .job-details strong { color: var(--ink); }
    .empty, .loading {
      grid-column: 1 / -1;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 30px;
      color: var(--muted);
      text-align: center;
    }
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.55);
      padding: 18px;
      z-index: 50;
    }
    .modal.open { display: flex; }
    .dialog {
      width: min(760px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 24px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.22);
    }
    .dialog h2 { margin: 0 0 6px; }
    .dialog p { color: var(--muted); margin: 0 0 20px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    label {
      display: block;
      color: #344054;
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .field { margin-bottom: 14px; }
    .full { grid-column: 1 / -1; }
    .consent {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
      margin: 10px 0 18px;
    }
    .consent input { width: auto; margin-top: 4px; }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 20px;
      max-width: 380px;
      background: #101828;
      color: #fff;
      border-radius: 8px;
      padding: 12px 16px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: 0.2s;
      z-index: 70;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .site-footer {
      border-top: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      padding: 14px 16px;
      text-align: center;
      font-size: 0.86rem;
      font-weight: 700;
      direction: ltr;
    }
    .site-footer a {
      color: #94a3b8;
      font-size: 0.76rem;
      font-weight: 700;
      text-decoration: none;
      margin-inline-start: 10px;
    }
    .site-footer a:hover { color: var(--accent); }
    @media (max-width: 760px) {
      .filters, .grid { grid-template-columns: 1fr; }
      .bar { align-items: flex-start; flex-direction: column; padding: 16px 0; }
      .top-actions { width: 100%; }
      .top-actions a { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand">
        <img class="brand-logo" src="/assets/ash-hasama-logo.png" alt="לוגו א.ש השמת עובדים">
        <span class="brand-name">א.ש השמת עובדים</span>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="wrap">
      <h1>משרות זמינות</h1>
      <p>בחר משרה, שלח פרטים וקורות חיים, ונחזור אליך כאשר יש התאמה. הפרטים נשמרים במאגר כדי שנוכל להציע לך גם משרות עתידיות מתאימות.</p>
    </div>
  </section>

  <main class="wrap">
    <div class="filters">
      <input id="search" placeholder="חיפוש לפי משרה, אזור או קטגוריה" oninput="filterJobs()">
      <select id="category" onchange="filterJobs()">
        <option value="">כל הקטגוריות</option>
      </select>
      <select id="area" onchange="filterJobs()">
        <option value="">כל האזורים</option>
      </select>
    </div>
    <section class="jobs" id="jobs">
      <div class="loading">טוען משרות...</div>
    </section>
  </main>

  <div class="modal" id="applyModal">
    <form class="dialog" id="applyForm">
      <h2 id="modalTitle">שליחת פרטים</h2>
      <p>הטופס יישלח למערכת ויישמר למעקב. ניתן לצרף קובץ PDF או Word.</p>
      <input type="hidden" name="jobId" id="jobId">

      <div class="grid">
        <div class="field">
          <label>שם מלא *</label>
          <input name="fullName" required>
        </div>
        <div class="field">
          <label>תעודת זהות</label>
          <input name="identityNumber" inputmode="numeric">
        </div>
        <div class="field">
          <label>טלפון *</label>
          <input name="phone" required>
        </div>
        <div class="field">
          <label>אימייל</label>
          <input name="email" type="email">
        </div>
        <div class="field">
          <label>עיר</label>
          <input name="city">
        </div>
        <div class="field">
          <label>אזור</label>
          <input name="area">
        </div>
        <div class="field">
          <label>זמינות להתחלה</label>
          <input name="availability" placeholder="מיידי, שבוע הבא, משמרות ערב...">
        </div>
        <div class="field">
          <label>ציפיות שכר</label>
          <input name="salaryExpectations">
        </div>
        <div class="field">
          <label>קטגוריות נוספות</label>
          <input name="categories" placeholder="בריסטה, ברמן, דלפק">
        </div>
        <div class="field full">
          <label>ניסיון קודם</label>
          <textarea name="experience"></textarea>
        </div>
        <div class="field full">
          <label>הודעה קצרה</label>
          <textarea name="message"></textarea>
        </div>
        <div class="field full">
          <label>קורות חיים PDF / Word</label>
          <input name="cv" type="file" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        </div>
      </div>

      <label class="consent">
        <input type="checkbox" name="consentToStore" required>
        אני מאשר לשמור את הפרטים במאגר לצורך התאמה למשרות וליצירת קשר.
      </label>

      <div class="actions">
        <button type="button" onclick="closeApply()">ביטול</button>
        <button class="primary" type="submit">שלח פרטים</button>
      </div>
    </form>
  </div>

  <div class="toast" id="toast"></div>
  <footer class="site-footer">v1.2.16 · L.K Consulting <a href="/pages/login.html">כניסת אדמין</a></footer>

  <script>
    let jobs = [];
    const jobsEl = document.getElementById('jobs');
    const toastEl = document.getElementById('toast');
    const fmt = n => Number(n || 0).toLocaleString('he-IL');

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 3200);
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
    }

    async function loadJobs() {
      try {
        const res = await fetch('/api/recruitment/public/jobs');
        jobs = await res.json();
        hydrateFilters();
        renderJobs(jobs);
      } catch (err) {
        jobsEl.innerHTML = '<div class="empty">לא ניתן לטעון משרות כרגע.</div>';
      }
    }

    function hydrateFilters() {
      const categories = [...new Set(jobs.map(j => j.category || j.profession).filter(Boolean))].sort();
      const areas = [...new Set(jobs.map(j => j.area).filter(Boolean))].sort();
      document.getElementById('category').innerHTML = '<option value="">כל הקטגוריות</option>' + categories.map(c => `<option>${escapeHtml(c)}</option>`).join('');
      document.getElementById('area').innerHTML = '<option value="">כל האזורים</option>' + areas.map(a => `<option>${escapeHtml(a)}</option>`).join('');
    }

    function filterJobs() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const category = document.getElementById('category').value;
      const area = document.getElementById('area').value;
      const filtered = jobs.filter(job => {
        const text = [job.title, job.area, job.category, job.profession, job.description, job.requirements, job.benefits, job.address, job.employerName].join(' ').toLowerCase();
        return (!q || text.includes(q)) &&
          (!category || (job.category || job.profession) === category) &&
          (!area || job.area === area);
      });
      renderJobs(filtered);
    }

    function renderJobs(list) {
      jobsEl.innerHTML = list.length ? list.map(job => `
        <article class="job">
          <div>
            <h2>${escapeHtml(job.title)}</h2>
          </div>
          ${job.hourlyRate ? `<div class="pay">₪${fmt(job.hourlyRate)} לשעה</div>` : ''}
          <div class="desc">${escapeHtml(job.description || 'פרטים נוספים יימסרו בשיחה.')}</div>
          <div class="job-details">
            ${job.requirements ? `<div><strong>דרישות:</strong> ${escapeHtml(job.requirements)}</div>` : ''}
            ${job.benefits ? `<div><strong>יתרונות / תנאים:</strong> ${escapeHtml(job.benefits)}</div>` : ''}
            ${job.area ? `<div><strong>אזור:</strong> ${escapeHtml(job.area)}</div>` : ''}
            ${job.hours ? `<div><strong>שעות:</strong> ${escapeHtml(job.hours)}</div>` : ''}
            ${job.address ? `<div><strong>כתובת:</strong> ${escapeHtml(job.address)}</div>` : ''}
            ${job.days?.length ? `<div><strong>ימים:</strong> ${escapeHtml(job.days.join(', '))}</div>` : ''}
            ${job.employerName ? `<div><strong>מעסיק:</strong> ${escapeHtml(job.employerName)}</div>` : ''}
          </div>
          <button class="primary" onclick="openApply('${job._id}', '${escapeHtml(job.title)}')">אני מעוניין / יצירת קשר</button>
        </article>
      `).join('') : '<div class="empty">לא נמצאו משרות תואמות.</div>';
    }

    function openApply(id, title) {
      document.getElementById('jobId').value = id;
      document.getElementById('modalTitle').textContent = `שליחת פרטים - ${title}`;
      document.getElementById('applyModal').classList.add('open');
    }

    function closeApply() {
      document.getElementById('applyModal').classList.remove('open');
      document.getElementById('applyForm').style.display = 'block';
      document.getElementById('applyForm').reset();
      document.getElementById('applySuccess')?.remove();
    }

    document.getElementById('applyModal').addEventListener('click', event => {
      if (event.target.id === 'applyModal') closeApply();
    });

    document.getElementById('applyForm').addEventListener('submit', async event => {
      event.preventDefault();
      const button = event.submitter;
      button.disabled = true;
      button.textContent = 'שולח...';
      try {
        const res = await fetch('/api/recruitment/public/apply', {
          method: 'POST',
          body: new FormData(event.currentTarget)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Submission failed');
        document.getElementById('applyForm').style.display = 'none';
        document.getElementById('applySuccess')?.remove();
        document.getElementById('applyModal').insertAdjacentHTML('beforeend', `
          <div class="dialog" id="applySuccess" style="text-align:center">
            <h2>הפרטים נשלחו בהצלחה</h2>
            <p style="color:var(--muted);line-height:1.7;margin:14px 0 22px">קיבלנו את הפנייה וקורות החיים. נחזור אליך בהקדם כאשר יש התאמה.</p>
            <button class="primary" onclick="closeApply()">סגור</button>
          </div>
        `);
        showToast('הפרטים נשלחו בהצלחה.');
      } catch (err) {
        showToast(err.message || 'לא ניתן לשלוח כרגע.');
      } finally {
        button.disabled = false;
        button.textContent = 'שלח פרטים';
      }
    });

    loadJobs();
  </script>
</body>
</html>
